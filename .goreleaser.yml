version: 2

project_name: nac

before:
  hooks:
    - go mod tidy

builds:
  - id: nac
    main: ./cmd/nac
    binary: nac
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/crymfox/nac/internal/config.Version={{.Version}}
      - -X github.com/crymfox/nac/internal/config.Commit={{.Commit}}
      - -X github.com/crymfox/nac/internal/config.Date={{.Date}}

archives:
  - name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64{{- else if eq .Arch "386" }}i386{{- else }}{{ .Arch }}{{- end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

brews:
  - repository:
      owner: Crymfox
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    homepage: "https://github.com/crymfox/nac"
    description: "n8n As Code - Manage n8n workflows and credentials as version-controlled files."
    license: "MIT"
    directory: Formula
